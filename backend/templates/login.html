<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Q-Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light min-vh-row d-flex align-items-center justify-content-center" style="min-height: 100vh; background-color: #141416 !important;">
    <div class="card bg-secondary text-white border-secondary p-4 shadow-lg" style="width: 100%; max-width: 400px; background-color: #1e1e22 !important;">
        <div class="card-body text-center">
            <h1 class="h4 card-title fw-bold mb-4">管理者ログイン</h1>
            
            <form action="" method="POST" class="text-start">
                <div class="mb-4">
                    <label class="form-label small fw-bold text-white text-uppercase">管理パスワード</label>
                    <input type="password" name="password" required class="form-control form-control-lg bg-dark text-white border-secondary">
                </div>
                <button type="submit" class="btn btn-light btn-lg w-full w-100 fw-bold">
                    ログイン
                </button>
            </form>
        </div>
    </div>
</body>
</html>
